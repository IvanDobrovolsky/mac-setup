# Starship Prompt Configuration
# Get started: https://starship.rs/config/

# Wait 10ms for starship to check files
scan_timeout = 10

# Add a newline before each prompt
add_newline = true

# Replace the "❯" symbol in the prompt with "➜"
[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

# Git branch
[git_branch]
symbol = " "
truncation_length = 20
truncation_symbol = "…"
style = "bold purple"
format = "on [$symbol$branch(:$remote_branch)]($style) "

# Git status
[git_status]
conflicted = "🏳 "
up_to_date = "✓"
untracked = "🤷"
ahead = "⇡${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
behind = "⇣${count}"
stashed = "📦"
modified = "📝"
staged = '[++\($count\)](green)'
renamed = "👅"
deleted = "🗑 "

# Directory
[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

# Node.js
[nodejs]
symbol = " "
style = "bold green"
format = "via [$symbol($version )]($style)"

# Python
[python]
symbol = " "
style = "bold yellow"
format = "via [$symbol($version )]($style)"

# Rust
[rust]
symbol = " "
style = "bold red"
format = "via [$symbol($version )]($style)"

# Go
[golang]
symbol = " "
style = "bold cyan"
format = "via [$symbol($version )]($style)"

# Docker
[docker_context]
symbol = " "
style = "bold blue"
format = "via [$symbol$context]($style) "

# Kubernetes
[kubernetes]
symbol = " "
style = "bold blue"
format = "on [$symbol$context]($style) "

# Git commit
[git_commit]
commit_hash_length = 7
style = "bold green"

# Command duration
[cmd_duration]
min_time = 2_000
format = "took [$duration](bold yellow)"

# Username
[username]
style_user = "bold blue"
style_root = "bold red"
format = "[$user]($style) "
disabled = false
show_always = false

# Hostname
[hostname]
ssh_only = false
format = "[$hostname](bold blue) "
disabled = false

# Time
[time]
disabled = false
format = "🕙 [$time](bold yellow) "
time_format = "%T"
use_12hr = false

