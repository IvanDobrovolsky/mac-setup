# AeroSpace config - BSP tiling window manager

# Start AeroSpace at login
start-at-login = true

# Mouse follows focus
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = ['move-mouse window-lazy-center']

# Gaps (matching previous yabai config)
[gaps]
inner.horizontal = 10
inner.vertical = 10
outer.left = 10
outer.right = 10
outer.top = 10
outer.bottom = 10

# Main binding mode
[mode.main.binding]

# Navigation (Alt + Arrows)
alt-left = 'focus left'
alt-down = 'focus down'
alt-up = 'focus up'
alt-right = 'focus right'

# Move Windows (Alt + Shift + Arrows)
alt-shift-left = 'move left'
alt-shift-down = 'move down'
alt-shift-up = 'move up'
alt-shift-right = 'move right'

# Toggle float (Alt + t)
alt-t = 'layout floating tiling'

# Toggle split direction (Alt + e)
alt-e = 'layout tiles horizontal vertical'

# Fullscreen (Alt + f)
alt-f = 'fullscreen'

# Resize (Alt + Shift + +/-)
alt-shift-equal = 'resize smart +50'
alt-shift-minus = 'resize smart -50'

# Workspaces (Alt + number)
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'

# Move window to workspace (Alt + Shift + number)
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'

# Application shortcuts (keeping your skhd shortcuts)
cmd-shift-d = 'exec-and-forget open -a "Discord"'
cmd-shift-w = 'exec-and-forget open -a "WhatsApp"'
cmd-shift-c = 'exec-and-forget open -a "Visual Studio Code"'
cmd-return = 'exec-and-forget open -n -a "Ghostty"'
cmd-shift-b = 'exec-and-forget open -a "Google Chrome"'
cmd-shift-a = 'exec-and-forget open -a "Google Chrome" "https://gemini.google.com/app"'
cmd-shift-p = 'exec-and-forget open -a "1Password"'

# Float rules for non-tileable apps
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.calculator'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.1password.1password'
run = 'layout floating'
